<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX RUN 2026</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>
<div class="runner">🏃‍♂️</div>

<section class="hero">
<img src="logo.png">
<h1>FEEL THE HEAT</h1>
<div class="countdown" id="countdown"></div>
<button class="btn" onclick="scrollToSection('register')">Register Now</button>
</section>

<section class="section">
<h2>Choose Your Run</h2>

<div class="cards">

<div class="card">
<h3>10K</h3>
<p class="price-old">₹600</p>
<p class="price-new">₹450</p>
<button class="btn" onclick="toggleMore(this)">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

<div class="card">
<h3>5K</h3>
<p class="price-old">₹550</p>
<p class="price-new">₹350</p>
<button class="btn" onclick="toggleMore(this)">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

<div class="card">
<h3>3K</h3>
<p class="price-old">₹450</p>
<p class="price-new">₹250</p>
<button class="btn" onclick="toggleMore(this)">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

</div>
</section>

<section class="section" id="register">
<h2>Register Now</h2>

<form id="form">
<input type="text" placeholder="Full Name" required id="name">
<input type="text" placeholder="Location" required id="location">
<input type="tel" placeholder="Phone" required id="phone">
<input type="email" placeholder="Email" required id="email">

<select id="category">
<option>10K</option>
<option>5K</option>
<option>3K</option>
</select>

<button class="btn">Pay & Register</button>
</form>
</section>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="script.js"></script>

</body>
</html>
