<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apex Run 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

  <!-- THREE JS -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

</head>

<body>

<!-- 3D CANVAS -->

<canvas id="bg"></canvas>

<!-- HERO -->

<section class="hero">
  <img src="logo.png" class="logo">
  <h1>APEX RUN 2026</h1>
  <p>Run Beyond Limits • Mangalore</p>
  <a href="#register" class="btn">Register Now</a>
</section>

<!-- RUNS -->

<section class="runs">
  <div class="card">
    <h2>3K Run</h2>
    <button onclick="openModal(0)">View More</button>
  </div>
  <div class="card">
    <h2>5K Run</h2>
    <button onclick="openModal(1)">View More</button>
  </div>
  <div class="card">
    <h2>10K Run</h2>
    <button onclick="openModal(2)">View More</button>
  </div>
</section>

<!-- MODAL -->

<div id="modal" class="modal">
  <div class="modal-box">
    <h2 id="modal-title"></h2>
    <ul id="rules"></ul>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- REGISTER -->

<section id="register" class="register">
  <h2>Register</h2>
  <form id="form">
    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Location / Area" required>
    <input type="tel" placeholder="Contact Number" required>
    <input type="email" placeholder="Email ID" required>

</section>

</html>
