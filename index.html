<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Run Cinematic</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADER -->
<div class="loader">
  <h1 class="loader-text">APEX RUN</h1>
</div>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- VIDEO HERO -->
<section class="hero">
  <video autoplay muted loop class="bg-video">
    <source src="assets/bg-video.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <img src="assets/logo.png" class="logo">
    <h1 class="title">APEX RUN 2026</h1>
  </div>
</section>

<!-- CONTENT -->
<section class="section">
  <h2 class="reveal">THE FUTURE OF RUNNING</h2>
</section>

<section class="section dark">
  <h2 class="reveal">NEON ENERGY</h2>
</section>

<section class="section">
  <h2 class="reveal">RUN BEYOND LIMITS</h2>
</section>

<section class="section final">
  <h2 class="reveal">JOIN THE MOVEMENT</h2>
  <button class="cta magnetic">REGISTER NOW</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script src="app.js"></script>
</body>
</html>
