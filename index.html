<body>

<canvas id="vfx"></canvas>

<section class="hero">
  <video autoplay muted loop class="bg-video">
    <source src="assets/bg-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <div class="top-logos">
      <img src="assets/logo1.png">
      <img src="assets/logo2.png">
      <img src="assets/logo3.png">
    </div>

    <img src="assets/logo.png" class="main-logo">
  </div>
</section>

<section class="about">
  <h2 class="reveal">About Apex Run 2026</h2>
  <p class="reveal">A futuristic neon marathon experience.</p>
</section>

<section class="events">

  <div class="event-card reveal">
    <img src="assets/3k.png">
    <h3>3K Run</h3>
    <button class="confetti">View More</button>
  </div>

  <div class="event-card reveal">
    <img src="assets/5k.png">
    <h3>5K Run</h3>
    <button class="confetti">View More</button>
  </div>

  <div class="event-card premium reveal">
    <img src="assets/10k.png">
    <h3>10K Run</h3>
    <button class="confetti">View More</button>
  </div>

</section>

<section class="register">
  <form id="regForm">
    <input placeholder="Name" required>
    <select>
      <option>S</option><option>M</option><option>L</option>
    </select>
    <button>Proceed</button>
  </form>

  <div id="paymentBox" class="hidden">
    <img src="assets/upi.png">
    <input type="file">
    <button id="confirmBtn">Confirm</button>
  </div>
</section>

</body>
