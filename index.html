<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX RUN 2026</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">
<img src="assets/logo.png">
<h1>FEEL THE HEAT</h1>
<div id="countdown"></div>
<button onclick="scrollToSection('register')" class="btn">Register Now</button>
</section>

<section class="section">
<h2>Choose Your Run</h2>

<div class="cards">

<div class="card">
<h3>10K</h3>
<p class="price-old">₹600</p>
<p class="price-new">₹450</p>
<button onclick="toggleMore(this)" class="btn">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

<div class="card">
<h3>5K</h3>
<p class="price-old">₹550</p>
<p class="price-new">₹350</p>
<button onclick="toggleMore(this)" class="btn">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

<div class="card">
<h3>3K</h3>
<p class="price-old">₹450</p>
<p class="price-new">₹250</p>
<button onclick="toggleMore(this)" class="btn">View More</button>
<div class="more">
<p>Dry Fit T-Shirt</p>
<p>Bib (No Chip)</p>
<p>E-Certificate</p>
<p>Refreshments</p>
</div>
</div>

</div>
</section>

<section id="register" class="section">
<h2>Register Now</h2>

<form id="form">
<input id="name" placeholder="Full Name" required>
<input id="location" placeholder="Location" required>
<input id="phone" placeholder="Phone" required>
<input id="email" placeholder="Email" required>

<select id="category">
<option>10K</option>
<option>5K</option>
<option>3K</option>
</select>

<button class="btn">Pay & Register</button>
</form>
</section>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/config.js"></script>
<script src="js/animations.js"></script>
<script src="js/payment.js"></script>
<script src="js/main.js"></script>

</body>
</html>
