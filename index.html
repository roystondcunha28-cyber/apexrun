<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Run 2026</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="light"></div>
<div class="fog"></div>

<nav class="nav">
  <h2>APEX RUN</h2>
  <a href="#register">Register</a>
</nav>

<section class="hero reveal">
  <img src="assets/logo.png" class="logo">
  <h1 class="title">RUN BEYOND LIMITS</h1>
  <p class="subtitle">National Level Marathon • Mangaluru</p>
  <button onclick="scrollToSection('register')" class="btn">Register Now</button>
</section>

<section class="section reveal">
  <h2>Choose Your Run</h2>

  <div class="cards">
    <div class="card glass">
      <h3>10K</h3>
      <p class="old">₹600</p>
      <p class="new">₹450</p>
    </div>

    <div class="card glass">
      <h3>5K</h3>
      <p class="old">₹550</p>
      <p class="new">₹350</p>
    </div>

    <div class="card glass">
      <h3>3K</h3>
      <p class="old">₹450</p>
      <p class="new">₹250</p>
    </div>
  </div>
</section>

<section id="register" class="section reveal">
<h2>Register</h2>

<form class="glass form">
<input placeholder="Full Name" required>
<input placeholder="Location" required>
<input placeholder="Phone" required>
<input placeholder="Email" required>

<select>
<option>10K</option>
<option>5K</option>
<option>3K</option>
</select>

<button class="btn">Pay & Register</button>
</form>
</section>

<script src="js/main.js"></script>
</body>
</html>
