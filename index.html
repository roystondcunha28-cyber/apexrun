<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX RUN 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<nav class="navbar">
  <h1>APEX RUN 2026</h1>
</nav>

<section class="hero">
  <h2>RUN BEYOND LIMITS</h2>
  <p>10 May 2026 | 5:00 AM</p>
  <div id="countdown"></div>
</section>

<section class="events">
  <div class="card">3K RUN - ₹250</div>
  <div class="card">5K RUN - ₹350</div>
  <div class="card">10K RUN - ₹450</div>
</section>

<section class="register">
  <h2>Register Now</h2>

  <form id="form">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Phone" required>

    <select id="event">
      <option>3K RUN</option>
      <option>5K RUN</option>
      <option>10K RUN</option>
    </select>

    <img src="qr.png" class="qr">

    <button type="submit">Submit</button>
  </form>

  <p id="status"></p>
</section>

<script src="script.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    event: document.getElementById("event").value,
    time: new Date()
  };

  try {
    await addDoc(collection(db, "registrations"), data);
    document.getElementById("status").innerText = "Registered Successfully!";
    form.reset();
  } catch (err) {
    document.getElementById("status").innerText = "Error!";
  }
});
</script>

</body>
</html>
